<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forest Fire Prediction</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1f4037, #99f2c8);
            height: 100vh;
        }

        .container {
            width: 400px;
            margin: auto;
            margin-top: 50px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            text-align: center;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
        }

        input, select {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        input::placeholder {
            color: #ccc;
        }

        select {
            color: white;
        }

        option {
            color: black;
            background: white;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔥 Forest Fire Prediction</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <input type="text" name="Temperature" placeholder="Temperature" required>
        <input type="text" name="RH" placeholder="Humidity (RH)" required>
        <input type="text" name="Ws" placeholder="Wind Speed" required>
        <input type="text" name="Rain" placeholder="Rain" required>
        <input type="text" name="FFMC" placeholder="FFMC" required>
        <input type="text" name="DMC" placeholder="DMC" required>
        <input type="text" name="ISI" placeholder="ISI" required>
        <input type="text" name="Classes" placeholder="Classes" required>

        <select name="Region" required>
            <option value="">Select Region</option>
            <option value="0">🌲 Algerian Forest</option>
            <option value="1">🌳 Sidi Bel Abbes</option>
        </select>

        <button type="submit">Predict</button>

    </form>
</div>

</body>
</html>
